<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create an account for AI-Based Skin Disease Detection">
    <title>Sign Up — Skin Disease Detection</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">🧬</div>
                <h1>Create Account</h1>
                <p>Join the AI-Based Skin Disease Detection Platform</p>
            </div>

            <!-- Alert -->
            <div id="authAlert" class="alert"></div>

            <!-- Signup Form -->
            <form onsubmit="handleSignup(event)" id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" class="form-input" 
                           placeholder="John Doe" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" class="form-input" 
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" class="form-input" 
                           placeholder="Minimum 6 characters" required minlength="6"
                           autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="signupConfirmPassword">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" class="form-input" 
                           placeholder="Re-enter your password" required
                           autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg">
                    Create Account
                </button>
            </form>

            <!-- Footer Links -->
            <div class="text-center mt-24">
                <p style="color: var(--text-secondary); font-size: 0.9rem;">
                    Already have an account? 
                    <a href="/" style="font-weight: 600;">Sign In</a>
                </p>
            </div>

            <!-- Theme Toggle -->
            <div class="text-center mt-16">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        if (isAuthenticated()) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
