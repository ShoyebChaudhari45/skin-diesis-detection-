<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Based Skin Disease Detection - Secure Login">
    <title>Login — Skin Disease Detection</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">🔬</div>
                <h1>Welcome Back</h1>
                <p>AI-Based Skin Disease Detection System</p>
            </div>

            <!-- Alert -->
            <div id="authAlert" class="alert"></div>

            <!-- Login Form -->
            <form onsubmit="handleLogin(event)" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" 
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" 
                           placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                    Sign In
                </button>
            </form>

            <!-- Footer Links -->
            <div class="text-center mt-24">
                <p style="color: var(--text-secondary); font-size: 0.9rem;">
                    Don't have an account? 
                    <a href="/signup" style="font-weight: 600;">Create Account</a>
                </p>
            </div>

            <!-- Theme Toggle -->
            <div class="text-center mt-16">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
